</head>
<body class="flex flex-col min-h-screen overflow-x-hidden">
    <nav class="bg-orange-500 border-gray-200">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-4 py-2">
            <a href="./index.html" class="flex items-center space-x-3">
                <img src="./img/logo.png" class="logoo ml-25 h-16 w-auto" alt="Logo" >
            </a>
            <div class="flex items-center md:order-2">
                <div class="">
                    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                        <svg class="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20"></svg>
                    </div>
                    <div class="mr-20 items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-search">
                        <ul class="flex flex-col p-4 mt-4 font-medium rounded-lg bg-orange-500 md:flex-row md:space-x-8 md:mt-0 md:bg-transparent">
                            <li>
                                <a href="./index.html" class="letra block py-2 px-3 text-white hover:bg-orange-600 rounded md:hover:bg-transparent md:hover:text-white">Inicio</a>
                            </li>
                            <li>
                                <a href="#" class="letra block py-2 px-3 text-white hover:bg-orange-600 rounded md:hover:bg-transparent md:hover:text-white">Servicios</a>
                            </li>
                            <li>
                                <a href="./registrar.html" class="letra block py-2 px-3 text-white hover:bg-orange-600 rounded md:hover:bg-transparent md:hover:text-white">Registrarse</a>
                            </li>
                            <li>
                                <a href="./login.html" class="letra block py-2 px-3 text-white hover:bg-orange-600 rounded md:hover:bg-transparent md:hover:text-white">Inicar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        </nav>
    <main class="flex-grow">
        <div class="letra titulologin">
            <h1 class="escrito">INICAR SESIÓN</h1>
        </div>
        <form class="max-w-md mx-auto mt-20">
            <div class="relative z-0 w-full mb-5 group">
                <input type="email" name="floating_email" id="floating_email" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0 focus:border-blue-600 peer" placeholder=" " required />
                <label for="floating_email" class="peer-focus:font-medium absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto peer-focus:text-blue-600 peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Correo</label>
            </div>
            <div class="relative z-0 w-full mb-5 group">
                <input type="password" name="floating_password" id="floating_password" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0 focus:border-blue-600 peer" placeholder=" " required />
                <label for="floating_password" class="peer-focus:font-medium absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600 peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Password</label>
            </div>
            <div class="relative z-0 w-full mb-5 group">
                <input type="password" name="repeat_password" id="floating_repeat_password" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0 focus:border-blue-600 peer" placeholder=" " required />
                <label for="floating_repeat_password" class="peer-focus:font-medium absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600 peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Confirm password</label>
            </div>
            <button type="submit" class="text-white bg-gray-50 hover:bg-gray-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Submit</button>
        </form>
    </main>
    <footer class="colorfoot bg-white rounded-lg shadow-sm dark:bg-gray-800">
        <div class="w-full max-w-screen-xl mx-auto p-4 flex flex-col items-center justify-between space-y-4 md:flex-row md:space-y-0">

                <li><a href="#" class="letra hover:underline me-4 md:me-6">Política Pagada</a></li>
                <li><a href="#" class="letra hover:underline me-4 md:me-6">Licencias</a></li>
                <li><a href="./contacto.html" class="letra hover:underline">Contacto</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
