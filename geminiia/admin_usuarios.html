<!DOCTYPE html>

        <nav class="space-y-2 flex-grow">

            <a href="./admin_productos.html" class="flex items-center p-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">

            <a href="./admin_usuarios.html" class="flex items-center p-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>

            <div>

            <a href="./admin_registrar.html"><button class="bg-ztep-azul text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-ztep-rojo transition-all shadow-xl">

        <div class="flex gap-4 mb-6 overflow-x-auto pb-2">

            <!-- <button class="bg-white border border-gray-200 text-gray-400 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:border-ztep-azul hover:text-ztep-azul transition-all">Staff</button> -->

                            <th class="px-4 md:px-8 py-5">Usuario</th>
                            <th class="px-4 py-5 hidden sm:table-cell">Contacto</th> <th class="px-4 py-5">Rol</th>
                            <th class="px-4 py-5 hidden lg:table-cell">Registro</th> <th class="px-4 py-5 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr class="hover:bg-gray-50/80 transition-colors">
                            <td class="px-4 md:px-8 py-4">
                                <div class="flex items-center gap-2 md:gap-4">
                                    <div class="w-8 h-8 md:w-10 md:h-10 bg-ztep-azul rounded-full flex-shrink-0 flex items-center justify-center text-white font-black text-[10px] md:text-xs">CP</div>
                                    <div class="min-w-0">
                                        <p class="font-bold text-gray-900 italic text-sm md:text-base truncate">Carlos Pérez</p>
                                        <p class="text-[8px] md:text-[10px] text-gray-400 font-bold uppercase truncate">ID: #001</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-4 hidden sm:table-cell">
                                <p class="text-xs md:text-sm font-bold text-gray-600 truncate">carlos@ztep.com</p>
                            </td>
                            <td class="px-4 py-4">

                                    Súper Admin
                                </span>
                            </td>
                            <td class="px-4 py-4 hidden lg:table-cell text-xs text-gray-500 font-medium">
                                12 Oct, 2023
                            </td>
                            <td class="px-4 py-4">
                                <div class="flex justify-center gap-2 md:gap-3">
                                    <button class="text-gray-400 hover:text-ztep-azul p-1">
                                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                    <button class="text-gray-400 hover:text-ztep-rojo p-1">
                                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
