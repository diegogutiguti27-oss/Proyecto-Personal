<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZTEP Admin - Inventario</title>
    <link rel="stylesheet" href="../css/adminproductos.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="letra bg-gray-50 flex flex-col md:flex-row min-h-screen overflow-hidden">

    <aside class="w-full md:w-64 bg-ztep-azul text-white p-6 flex flex-col z-50">
        <div class="flex items-center mb-10 justify-center md:justify-start">
            <img src="../img/logo.png" class="h-10 w-auto" alt="Logo">
            <span class="ml-3 text-2xl font-black italic tracking-tighter"></span>
        </div>
        
        <nav class="space-y-2 flex-grow">
            <a href="./admin_menuprin.html" class="flex items-center p-3 bg-ztep-rojo rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
            </a>
            <a href="./admin_productos.html" class="flex items-center p-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                Productos
            </a>
            <a href="./admin_usuarios.html" class="flex items-center p-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Usuarios
            </a>
            <a href="./admin_pedidos.html" class="flex items-center p-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Pedidos
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-gray-800">
            <a href="./index.html" class="flex items-center p-3 text-ztep-rojo font-black text-xs uppercase tracking-widest hover:bg-ztep-rojo hover:text-white rounded-xl transition-all">
                Cerrar Sesión
            </a>
        </div>
    </aside>

    <main class="flex-grow p-4 md:p-10 flex flex-col h-screen overflow-hidden">
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4 flex-shrink-0">
            <div>
                <h1 class="text-3xl font-black text-gray-900 uppercase italic leading-none">Gestión de <span class="text-ztep-rojo">Inventario</span></h1>
                <p class="text-gray-500 text-sm mt-1">Administra el stock y catálogo de calzado.</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                <div class="relative">
                    <input type="text" placeholder="Buscar producto..." class="w-full sm:w-64 bg-white border-none rounded-2xl py-3 pl-10 pr-4 text-sm shadow-md focus:ring-2 focus:ring-ztep-rojo">
                    <svg class="w-4 h-4 absolute left-4 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <button class="bg-ztep-azul text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-ztep-rojo transition-all shadow-xl">
                    + Nuevo Producto
                </button>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] shadow-2xl flex-grow overflow-hidden flex flex-col border border-gray-100">
            <div class="overflow-x-auto flex-grow">
                <table class="w-full text-left min-w-[700px]">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] border-b border-gray-100">
                            <th class="px-8 py-5">Producto</th>
                            <th class="px-6 py-5">Marca</th>
                            <th class="px-6 py-5">Precio</th>
                            <th class="px-6 py-5">Stock</th>
                            <th class="px-6 py-5 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr class="hover:bg-gray-50/80 transition-colors">
                            <td class="px-8 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-gray-100 rounded-xl overflow-hidden p-2">
                                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike" class="w-full h-full object-contain">
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-900 italic">Nike Air Max 270</p>
                                        <p class="text-[10px] text-gray-400 uppercase font-bold">SKU: ZTP-001</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-gray-600">Nike</td>
                            <td class="px-6 py-4 font-black text-ztep-rojo">$350.000</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                                    <span class="text-sm font-bold text-gray-700">12 und.</span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex justify-center gap-2">
                                    <button class="p-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-ztep-azul hover:text-white transition-all">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                    <button class="p-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-ztep-rojo hover:text-white transition-all">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-50/80 transition-colors">
                            <td class="px-8 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-gray-100 rounded-xl overflow-hidden p-2 grayscale">
                                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike" class="w-full h-full object-contain">
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-900 italic">Sky Walk Casual</p>
                                        <p class="text-[10px] text-gray-400 uppercase font-bold">SKU: ZTP-002</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-gray-600">ZTEP Originals</td>
                            <td class="px-6 py-4 font-black text-ztep-rojo">$150.000</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                    <span class="text-sm font-bold text-red-600">2 und.</span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex justify-center gap-2">
                                    <button class="p-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-ztep-azul hover:text-white transition-all">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                    <button class="p-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-ztep-rojo hover:text-white transition-all">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="p-6 bg-gray-50 flex justify-between items-center border-t border-gray-100 flex-shrink-0">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Mostrando 1-10 de 45</span>
                <div class="flex gap-2">
                    <button class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-xs font-black uppercase hover:bg-gray-100 transition-all">Ant.</button>
                    <button class="px-4 py-2 bg-ztep-azul text-white rounded-xl text-xs font-black uppercase hover:bg-ztep-rojo transition-all">Sig.</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
