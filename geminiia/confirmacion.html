<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! - ZTEP</title>
    <link rel="stylesheet" href="../css/confirmacion.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

    </style>
</head>
<body class="letra bg-gray-50 flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center px-4 py-20">
        <div class="max-w-lg w-full bg-white rounded-[3rem] shadow-2xl p-10 md:p-16 text-center border border-gray-100">
            
            <div class="mb-8 flex justify-center">
                <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center animate-check">
                    <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>

            <h1 class="text-3xl md:text-4xl font-black text-gray-900 italic uppercase mb-4">
                ¡Pedido <span class="text-ztep-rojo">Confirmado</span>!
            </h1>
            
            <p class="text-gray-500 mb-8 leading-relaxed">
                Gracias por confiar en **ZTEP**. Hemos recibido tu orden con éxito. En breve recibirás un correo con el resumen de tu compra y el número de guía.
            </p>

            <div class="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100 text-left">
                <div class="flex justify-between mb-2">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Orden:</span>
                    <span class="text-sm font-black text-gray-900">#ZTP-88291</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Entrega estimada:</span>
                    <span class="text-sm font-black text-ztep-rojo">2 - 4 días hábiles</span>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <a href="../geminiia/menuprin.html" class="w-full bg-ztep-azul text-white font-black py-4 rounded-2xl shadow-xl hover:bg-ztep-rojo transition-all uppercase tracking-widest text-sm">
                    Volver a la tienda
                </a>
                <button onclick="generarPDF()" class="text-xs font-bold text-gray-400 hover:text-gray-600 uppercase tracking-widest">
                    Descargar Recibo (PDF)
                </button>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center">
        <p class="text-[10px] text-gray-400 uppercase tracking-[0.3em]">Premium Footwear Experience</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        async function generarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // Configuración de colores (ZTEP Azul y Rojo)
    const azulZtep = [32, 39, 56]; 
    const rojoZtep = [225, 29, 72];

    // --- ENCABEZADO ---
    doc.setFillColor(...azulZtep);
    doc.rect(0, 0, 210, 40, 'F'); // Fondo azul superior
    
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(30);
    doc.text("ZTEP", 20, 25);
    
    doc.setFontSize(10);
    doc.text("PREMIUM FOOTWEAR EXPERIENCE", 20, 32);

    // --- TÍTULO DEL RECIBO ---
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(18);
    doc.text("RECIBO DE COMPRA", 20, 60);
    
    // Línea decorativa roja
    doc.setDrawColor(...rojoZtep);
    doc.setLineWidth(1);
    doc.line(20, 65, 60, 65);

    // --- DETALLES DE LA ORDEN ---
    doc.setFontSize(12);
    doc.setFont("helvetica", "normal");
    doc.text("Orden: #ZTP-88291", 20, 80);
    doc.text("Fecha: " + new Date().toLocaleDateString(), 20, 88);
    doc.text("Estado: Confirmado / Pagado", 20, 96);

    // --- TABLA DE PRODUCTOS ---
    doc.setFillColor(245, 245, 245);
    doc.rect(20, 110, 170, 10, 'F');
    doc.setFont("helvetica", "bold");
    doc.text("Producto", 25, 117);
    doc.text("Total", 160, 117);

    doc.setFont("helvetica", "normal");
    doc.text("Sky Walk Casual (Talla 40)", 25, 130);
    doc.text("$150.000", 160, 130);

    // --- TOTAL ---
    doc.setDrawColor(230, 230, 230);
    doc.line(20, 140, 190, 140);
    
    doc.setFontSize(16);
    doc.setFont("helvetica", "bold");
    doc.text("TOTAL PAGADO:", 100, 155);
    doc.setTextColor(...rojoZtep);
    doc.text("$150.000", 160, 155);

    // --- PIE DE PÁGINA ---
    doc.setTextColor(150, 150, 150);
    doc.setFontSize(9);
    doc.text("Gracias por tu compra en ZTEP. Villavicencio, Meta.", 20, 280);

    // Descargar el archivo
    doc.save("Recibo_ZTEP_88291.pdf");
}
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>

</body>
</html>
